services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: moodish
      POSTGRES_USER: moodish
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moodish_dev_pw}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped

  backend:
    build: ./backend
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    environment:
      - ALLOWED_ORIGINS=http://frontend:3000
      - DATABASE_URL=postgresql://moodish:${POSTGRES_PASSWORD:-moodish_dev_pw}@postgres:5432/moodish
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    volumes:
      - recipe-data:/app/data
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_KAKAO_JS_KEY: ${KAKAO_JS_KEY:-}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-0x4AAAAAACtNrcP0z6UMMxA1}
    ports:
      - "3091:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  recipe-data:
  postgres-data:
