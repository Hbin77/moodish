services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_KAKAO_JS_KEY: ${KAKAO_JS_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
